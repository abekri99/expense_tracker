<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="add.css">
    <title>adding page</title>
</head>
<body>
    <div id="dashboard">
        <div id="header">
        <h1 id="title">Add your Transaction</h1>
        </div>
        <form onsubmit="add(event)">

            <div>

                <span id="title">Title</span>
                <input type="text" id="title-input" required placeholder="enter your title">


            </div>

            <div>
                <span id="date">Date</span>
                <input type="date" id="date-input">


            </div>
            <div>
                <span id="time">time</span>
                <input type="time" id="time-input" required>


            </div>

            <div>
                <span id="category">Catagory</span>
                <select name="catagory" id="catagory-selection" required>
                    <option value="💰Salary">💰 Salary</option>
                    <option value="🏢Business">🏢 Business</option>
                    <option value="💻Freelance">💻 Freelance</option>
                    <option value="📈Investment">📈 Investment</option>
                    <option value="🎁Gift">🎁 Gift</option>
                    <option value="🏦Savings">🏦 Savings</option>
                
                    <!-- Expense -->
                    <option value="🍔Food">🍔 Food</option>
                    <option value="🚌Transport">🚌 Transport</option>
                    <option value="🏠Rent">🏠 Rent</option>
                    <option value="💡Utilities">💡 Utilities</option>
                    <option value="🛍️Shopping">🛍️ Shopping</option>
                    <option value="🎬Entertainment">🎬 Entertainment</option>
                    <option value="🏥Health">🏥 Health</option>
                    <option value="📚Education">📚 Education</option>
                    <option value="🎉Gifts">🎉 Gifts</option>
                    <option value="📦Others">📦 Others</option>
                </select>
            </div>

            <div id="type">
                <span id="type-title">Type</span>
                <select name="type" id="in or out" required>
                    <option value="" selected disabled>choose type</option>
                    <option value="income"> 🔺income</option>
                    <option value="expense"> 🔻expense</option>
                </select>

            </div>
            
            <div>
                <span>Amount</span>
                <input type="number" id="amount-input" placeholder="Enter amount">
            </div>

            <div id="buttons">
                <button type="submit">Add</button>
                <button type="button" id="cancel" onclick="window.location.href='index.html'">cancel</button>
                <button type="reset"  id="reset"> reset</button>
            </div>


         </form>
    </div>
    <script src="add.js"></script>
</body>
</html>
